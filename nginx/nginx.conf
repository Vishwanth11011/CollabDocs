# ============================================================
# CollabDocs — Nginx Reverse Proxy Configuration
# ============================================================
# Routes traffic to the appropriate microservice:
#   /ws/*       → Collaboration Service (WebSocket upgrade)
#   /api/links  → URL Shortener Service
#   /s/*        → Short link resolution (Shortener)
#   /*          → Frontend SPA
# ============================================================

events {
    worker_connections 1024;
}

http {
    # ── Upstream Backends ──
    upstream collab_backend {
        server collaboration:3001;
    }

    upstream shortener_backend {
        server shortener:3002;
    }

    upstream frontend_backend {
        server frontend:80;
    }

    # ── WebSocket Upgrade Map ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Gzip Compression ──
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        gzip_min_length 256;

        # ── WebSocket → Collaboration Service ──
        location /ws/ {
            proxy_pass http://collab_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time
            proxy_buffering off;
        }

        # ── Collaboration REST API ──
        location /api/documents {
            proxy_pass http://collab_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── URL Shortener REST API ──
        location /api/links {
            proxy_pass http://shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Short Link Resolution ──
        location /s/ {
            proxy_pass http://shortener_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health Checks ──
        location /health/collab {
            proxy_pass http://collab_backend/health;
        }

        location /health/shortener {
            proxy_pass http://shortener_backend/health;
        }

        # ── Frontend SPA (catch-all) ──
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
